<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: {{background}};
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .top-bar { width: 100%; height: 8px; background: {{primary}}; }
  .brand {
    position: absolute; top: 24px; left: 40px;
    font-size: 24px; font-weight: 700;
    color: {{primary}}; opacity: 0.5;
  }
  .main-area {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 60px 70px 100px;
  }
  .slide-title {
    font-size: 36px; font-weight: 900;
    color: {{text_primary}};
    text-align: center;
    margin-bottom: 36px;
  }
  .list-item {
    display: flex; align-items: flex-start;
    gap: 20px;
    margin-bottom: 20px;
    background: white;
    border-radius: 16px;
    padding: 28px 32px;
    box-shadow: 0 2px 8px rgba(42,123,139,0.08);
  }
  .list-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: {{primary}};
    color: white;
    font-size: 22px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .list-content {
    flex: 1;
  }
  .list-label {
    font-size: 30px; font-weight: 700;
    color: {{text_primary}};
    line-height: 1.4;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .list-desc {
    font-size: 26px;
    color: {{text_secondary}};
    line-height: 1.5;
    margin-top: 4px;
  }
  .dots {
    position: absolute; bottom: 48px; left: 0; right: 0;
    display: flex; gap: 12px; justify-content: center;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: {{dot_inactive}}; }
  .dot.active { background: {{primary}}; }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="brand">{{brand_name}}</div>
  <div class="main-area">
    <div class="slide-title">{{title}}</div>
    {{list_items_html}}
  </div>
  <div class="dots">{{dots_html}}</div>
</body>
</html>

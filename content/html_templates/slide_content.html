<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: {{background}};
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  /* 上部ティールライン */
  .top-bar {
    width: 100%; height: 8px;
    background: {{primary}};
  }
  .brand {
    position: absolute; top: 24px; left: 40px;
    font-size: 24px; font-weight: 700;
    color: {{primary}}; opacity: 0.5;
  }
  .main-area {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 60px 60px 100px;
  }
  .header {
    display: flex; align-items: center;
    justify-content: center;
    padding: 0 0 20px;
    gap: 14px;
  }
  .slide-badge {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: {{primary}};
    color: white;
    font-size: 26px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .slide-title {
    font-size: 38px; font-weight: 900;
    color: {{text_primary}};
    line-height: 1.35;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 44px;
    box-shadow: 0 2px 12px rgba(42,123,139,0.10);
  }
  .card-body {
    font-size: 34px;
    color: {{text_primary}};
    line-height: 1.75;
  }
  /* 数字強調 */
  .card-body b, .card-body strong {
    font-size: 42px;
    color: {{accent}};
    font-weight: 900;
  }
  .highlight-box {
    margin-top: 24px;
    background: {{accent_light}};
    border-left: 5px solid {{accent}};
    border-radius: 10px;
    padding: 20px 24px;
    font-size: 30px;
    font-weight: 700;
    color: {{text_primary}};
    line-height: 1.5;
  }
  /* 出典 */
  .source {
    margin-top: 16px;
    font-size: 20px;
    color: {{text_secondary}};
    text-align: right;
  }
  .dots {
    position: absolute; bottom: 48px; left: 0; right: 0;
    display: flex; gap: 12px;
    justify-content: center;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: {{dot_inactive}};
  }
  .dot.active {
    background: {{primary}};
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="brand">{{brand_name}}</div>
  <div class="main-area">
    <div class="header">
      <div class="slide-badge">{{slide_number}}</div>
      <div class="slide-title">{{title}}</div>
    </div>
    <div class="card">
      <div class="card-body">{{body_html}}</div>
      {{#if highlight}}<div class="highlight-box">{{highlight}}</div>{{/if}}
      {{#if source}}<div class="source">{{source}}</div>{{/if}}
    </div>
  </div>
  <div class="dots">{{dots_html}}</div>
</body>
</html>

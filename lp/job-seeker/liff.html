<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナースロビー — 求人を受け取る</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ブランドカラー: --nr-color-primary #1A6B8A (teal blue), CTA #2D9F6F (green), accent #D4A843 (gold) */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', "Hiragino Sans", sans-serif;
  background: linear-gradient(135deg, #E8F4F8 0%, #FFF8E8 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: #2C2C2C;
}
.card {
  background: #FFFFFF;
  border-radius: 20px;
  padding: 36px 28px 32px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(26, 107, 138, 0.12);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #1A6B8A 0%, #2D9F6F 50%, #D4A843 100%);
}
.logo-img {
  height: 96px;
  width: auto;
  max-width: 320px;
  margin: 0 auto 28px;
  display: block;
}

/* ドットローディング */
.dots {
  display: inline-flex;
  gap: 6px;
  margin: 12px 0 16px;
  align-items: center;
  justify-content: center;
}
.dots span {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #1A6B8A;
  animation: pulse 1.4s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; background: #2D9F6F; }
.dots span:nth-child(3) { animation-delay: 0.4s; background: #D4A843; }
@keyframes pulse {
  0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

.status {
  font-size: 1rem;
  font-weight: 600;
  color: #1A6B8A;
  line-height: 1.6;
  margin-top: 8px;
  transition: opacity 0.3s;
}
.status-sub { font-size: 0.82rem; color: #6B7280; margin-top: 10px; line-height: 1.6; }
.error { color: #d32f2f; }

.progress-steps {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
}
.progress-step {
  width: 28px; height: 4px;
  border-radius: 2px;
  background: #E5E7EB;
  transition: background 0.3s;
}
.progress-step.done { background: #2D9F6F; }
.progress-step.active { background: #1A6B8A; animation: shimmer 1.5s ease-in-out infinite; }
@keyframes shimmer {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.btn-add {
  display: inline-block;
  background: linear-gradient(135deg, #2D9F6F 0%, #1E7A52 100%);
  color: #FFFFFF;
  font-size: 1rem;
  font-weight: 700;
  padding: 16px 32px;
  border-radius: 12px;
  text-decoration: none;
  margin-top: 20px;
  transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(45, 159, 111, 0.3);
}
.btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45, 159, 111, 0.4); }

.excitement {
  font-size: 0.85rem;
  color: #1A6B8A;
  margin-top: 16px;
  padding: 10px 14px;
  background: #E8F4F8;
  border-radius: 10px;
  line-height: 1.6;
}

.hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <img src="/assets/logo-nursrobby.png" alt="ナースロビー" class="logo-img" onerror="this.style.display='none';">

  <!-- 読み込み中（モバイルLIFF処理中）- 最小限の視覚フィードバック -->
  <div id="state-loading">
    <div class="dots"><span></span><span></span><span></span></div>
    <p class="status" id="loading-status">─ ─ ─</p>
  </div>

  <!-- 友だち追加が必要（モバイルは自動リダイレクトするので通常表示されない） -->
  <div id="state-add-friend" class="hidden">
    <p class="status">🎁 あなたに合う求人の準備ができました</p>
    <a id="add-friend-btn" href="#" class="btn-add">LINEで受け取る</a>
    <p class="status-sub">完全無料・電話なし・いつでもブロックOK</p>
  </div>

  <!-- PC向け: QRコード表示 -->
  <div id="state-pc-qr" class="hidden">
    <p class="status" style="margin-bottom:14px;">📱 スマホで読み取ってください</p>
    <div id="qrcode-container" style="display:inline-block;padding:16px;background:#FFFFFF;border:2px solid #1A6B8A;border-radius:14px;"></div>
    <p class="excitement" style="margin-top:16px;">
      ✨ LPで答えた内容を引き継いで、<br>
      あなた専用の求人をLINEに届けます
    </p>
    <p class="status-sub" style="margin-top:12px;">
      <a href="#" id="pc-direct-link" style="color:#1A6B8A;font-size:0.85rem;text-decoration:underline;">このまま直接開く場合はこちら</a>
    </p>
  </div>


  <!-- 既に友だち追加済み -->
  <div id="state-already-friend" class="hidden">
    <div class="dots"><span></span><span></span><span></span></div>
    <p class="status">✉️ あなた専用の求人をLINEに送信中...</p>
    <p class="status-sub">LINEに戻ってご確認ください</p>
  </div>

  <!-- エラー -->
  <div id="state-error" class="hidden">
    <p class="status error" id="error-msg">エラーが発生しました</p>
    <a href="https://line.me/R/ti/p/@174cxnev" class="btn-add">LINEで友だち追加</a>
    <p class="status-sub">※LINEで直接追加できます</p>
  </div>
</div>

<!-- QRコード (PC向け) + LIFF SDK -->
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/versions/2.24.0/sdk.js"></script>
<script>
(function() {
  'use strict';

  // ========== 設定 ==========
  // LINE Developers Console で作成した LIFF ID をここに設定
  // 未設定の場合はフォールバック（lin.ee直リンク）に自動切り替え
  var LIFF_ID = '2009683996-7pCYfOP7';
  var API_BASE = 'https://robby-the-match-api.robby-the-robot-2026.workers.dev';
  var LINE_ADD_URL = 'https://line.me/R/ti/p/@174cxnev';

  // ========== URLパラメータ取得 ==========
  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get('session_id') || '';

  // ========== DOM ==========
  var stateLoading = document.getElementById('state-loading');
  var stateAddFriend = document.getElementById('state-add-friend');
  var stateAlreadyFriend = document.getElementById('state-already-friend');
  var stateError = document.getElementById('state-error');
  var statePcQr = document.getElementById('state-pc-qr');
  var errorMsg = document.getElementById('error-msg');
  var addFriendBtn = document.getElementById('add-friend-btn');

  function showState(el) {
    [stateLoading, stateAddFriend, stateAlreadyFriend, stateError, statePcQr].forEach(function(s) {
      s.classList.add('hidden');
    });
    el.classList.remove('hidden');
  }

  // ========== PC判定（LIFF login画面を避けるためQRコード表示） ==========
  function isMobileDevice() {
    var ua = navigator.userAgent || '';
    return /iPhone|iPad|iPod|Android|LINE|Mobile/.test(ua);
  }

  // PC/デスクトップの場合はQRコードを出して終了（LIFF login誘導を避ける）
  if (!isMobileDevice()) {
    // QRはLIFF直接URL（https://liff.line.me/{LIFF_ID}?...）を指定する。
    // スマホでスキャン→LINEアプリが直接LIFFを起動→モバイル分岐のLIFF SDKで
    // link-session POSTが走り liff:{userId} にsession+answersがKV保存される。
    // 友だち追加後の follow webhook で liff:{userId} を拾い、マッチング表示に直行。
    // 旧方式（/api/line-start + dm_text）は dm_text の自動送信が不安定でanswersが欠落していた。
    var qrParams = 'source=' + encodeURIComponent(params.get('source') || 'shindan')
      + '&intent=' + encodeURIComponent(params.get('intent') || 'diagnose')
      + '&session_id=' + encodeURIComponent(sessionId || ('pc_' + Date.now()))
      + '&area=' + encodeURIComponent(params.get('area') || '')
      + '&answers=' + encodeURIComponent(params.get('answers') || '');
    var liffQrUrl = LIFF_ID
      ? ('https://liff.line.me/' + LIFF_ID + '?' + qrParams)
      : (API_BASE + '/api/line-start?' + qrParams);
    // フォールバック直リンクは /api/line-start（LIFFを開けない環境向け）
    var fallbackLineStartUrl = API_BASE + '/api/line-start?' + qrParams;

    var qrContainer = document.getElementById('qrcode-container');
    var pcDirectLink = document.getElementById('pc-direct-link');
    if (pcDirectLink) pcDirectLink.href = fallbackLineStartUrl;
    if (window.QRious && qrContainer) {
      try {
        var qrCanvas = document.createElement('canvas');
        qrContainer.appendChild(qrCanvas);
        new QRious({
          element: qrCanvas,
          value: liffQrUrl,
          size: 220,
          padding: 8,
          background: '#ffffff',
          foreground: '#1a7f64',
          level: 'M'
        });
      } catch (e) {
        qrContainer.innerHTML = '<p style="color:#d32f2f;">QR生成エラー</p>';
      }
    } else {
      qrContainer.innerHTML = '<p style="color:#d32f2f;">QRライブラリ読込失敗</p><p style="font-size:0.82rem;color:#6B7280;margin-top:8px;">下のリンクからLINEを開いてください</p>';
    }
    showState(statePcQr);
    return;
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    showState(stateError);
  }

  // ========== LIFF ID 未設定時のフォールバック ==========
  if (!LIFF_ID) {
    // LIFF未設定: 従来のline-startエンドポイント経由にフォールバック
    if (sessionId) {
      window.location.href = API_BASE + '/api/line-start?session_id=' + encodeURIComponent(sessionId)
        + '&source=' + encodeURIComponent(params.get('source') || 'lp')
        + '&intent=' + encodeURIComponent(params.get('intent') || 'see_jobs')
        + '&area=' + encodeURIComponent(params.get('area') || '')
        + '&answers=' + encodeURIComponent(params.get('answers') || '');
    } else {
      window.location.href = LINE_ADD_URL;
    }
    return;
  }

  // ========== ステータス表示（数秒で読めないので最小限） ==========
  // 処理中は「─ ─ ─」固定、最後の送信時のみ "LINEに送信中…" を一瞬表示
  var statusEl = document.getElementById('loading-status');
  function setStatus(msg) { if (statusEl) statusEl.textContent = msg; }
  function setStep() { /* プログレスバー廃止・ドットパルスのみ */ }

  // 10秒タイムアウト: どこかで詰まったらフォールバック表示
  var fallbackTimer = setTimeout(function() {
    showError('接続に時間がかかっています');
  }, 10000);

  function done() { clearTimeout(fallbackTimer); }

  // ========== LIFF 初期化 ==========
  liff.init({ liffId: LIFF_ID })
    .then(function() {
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
        return Promise.reject('LOGIN_REDIRECT');
      }
      return liff.getProfile();
    })
    .then(function(profile) {
      if (!profile) return Promise.reject('NO_PROFILE');

      var userId = profile.userId;

      // 友だち追加状況チェック
      return liff.getFriendship()
        .catch(function() { return { friendFlag: false }; }) // getFriendship失敗時はfalse扱い
        .then(function(data) {
          var isFriend = !!(data && data.friendFlag);
          setStatus(isFriend ? 'セッションを連携中...' : '友だち追加画面を準備中...');

          // セッション紐付けAPI - LP診断回答も引き継ぎ
          return fetch(API_BASE + '/api/link-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              session_id: sessionId || ('liff_' + Date.now()),
              user_id: userId,
              already_friend: isFriend,
              source: params.get('source') || 'liff',
              intent: params.get('intent') || 'see_jobs',
              area: params.get('area') || '',
              answers: params.get('answers') || '',
            }),
          })
          .then(function(res) {
            if (!res.ok) throw new Error('API error: ' + res.status);
            return res.json();
          })
          .then(function() {
            done();
            if (isFriend) {
              // 既に友だち → Worker側でPush送信済み → LINEに戻す
              showState(stateAlreadyFriend);
              setTimeout(function() {
                if (liff.isInClient()) {
                  liff.closeWindow();
                } else {
                  window.location.href = 'line://ti/p/@174cxnev';
                }
              }, 1500);
            } else {
              // 友だち未追加 → 即自動リダイレクト（ボタン1タップの一手間を省く）
              setStatus('✉️ LINEに送信中');
              setTimeout(function() {
                window.location.href = LINE_ADD_URL;
              }, 300);
            }
          });
        });
    })
    .catch(function(err) {
      done();
      if (err === 'LOGIN_REDIRECT' || err === 'NO_PROFILE') return;
      console.error('LIFF error:', err);
      showError('エラー: ' + (err.message || err));
    });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>会員登録 | ナースロビー</title>
  <style>
    :root {
      --primary: #1A6B8A;
      --primary-dark: #0F4A62;
      --cta: #2D9F6F;
      --cta-dark: #258A5E;
      --text: #2C2C2C;
      --text-muted: #6B7280;
      --border: #E0E7EC;
      --bg-tint: #F6FAFC;
      --err: #C55A53;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      color: var(--text); background: #F9FBFC; line-height: 1.6; font-size: 15px;
    }
    .container { max-width: 560px; margin: 0 auto; padding: 24px 20px 140px; }
    h1 { font-size: 1.4rem; margin: 0 0 8px; color: var(--primary); }
    .lead {
      font-size: 0.9rem; color: var(--text-muted); margin: 0 0 24px;
      background: var(--bg-tint); padding: 12px 16px; border-radius: 10px;
      border-left: 3px solid var(--primary);
    }
    .card {
      background: #fff; border-radius: 12px; padding: 20px;
      margin-bottom: 16px; box-shadow: 0 1px 4px rgba(15,74,98,0.06);
      border: 1px solid var(--border);
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 0.85rem; color: var(--text-muted);
      margin-bottom: 4px; font-weight: 500;
    }
    .field label .required { color: var(--err); margin-left: 4px; }
    input[type="text"], input[type="tel"], input[type="email"], select {
      width: 100%; padding: 10px 12px; font-size: 16px;
      border: 1px solid var(--border); border-radius: 8px; background: #fff;
      color: var(--text); font-family: inherit;
    }
    .field-row { display: flex; gap: 8px; }
    .field-row .field { flex: 1; }
    .consent {
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 16px; font-size: 0.85rem; line-height: 1.7;
    }
    .consent label {
      display: flex; align-items: flex-start; gap: 10px; cursor: pointer; padding: 8px 0;
    }
    .consent input[type="checkbox"] {
      width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px;
    }
    .consent a { color: var(--primary); }
    .consent .note {
      font-size: 0.78rem; color: var(--text-muted);
      margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border);
    }
    .submit-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08); z-index: 100;
    }
    .submit-btn {
      width: 100%; background: var(--cta); color: #fff; border: none;
      padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .submit-btn:hover { background: var(--cta-dark); }
    .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
    .status { font-size: 0.85rem; text-align: center; margin-top: 8px; color: var(--text-muted); }
    .status.error { color: var(--err); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌱 ナースロビー会員登録</h1>
    <p class="lead">
      お名前と電話番号だけで<b>ナースロビー会員</b>になれます。<br>
      履歴書はマイページからいつでも作成・編集できます。
    </p>

    <form id="liteForm">
      <div class="card">
        <h2 style="font-size:1.05rem;margin:0 0 12px;color:var(--primary);">👤 基本情報</h2>
        <div class="field-row">
          <div class="field">
            <label>姓（ふりがな）</label>
            <input type="text" name="lastNameFurigana" placeholder="たなか">
          </div>
          <div class="field">
            <label>名（ふりがな）</label>
            <input type="text" name="firstNameFurigana" placeholder="みさき">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>姓<span class="required">*</span></label>
            <input type="text" name="lastName" required placeholder="田中">
          </div>
          <div class="field">
            <label>名<span class="required">*</span></label>
            <input type="text" name="firstName" required placeholder="美咲">
          </div>
        </div>
        <div class="field">
          <label>電話番号<span class="required">*</span></label>
          <input type="tel" name="phone" required placeholder="090-1234-5678">
        </div>
        <div class="field">
          <label>メールアドレス（任意）</label>
          <input type="email" name="email" placeholder="example@example.com">
        </div>
        <div class="field">
          <label>希望エリア</label>
          <select name="preferredArea">
            <option value="">選択してください</option>
            <option value="yokohama">横浜</option>
            <option value="kawasaki">川崎</option>
            <option value="sagamihara">相模原</option>
            <option value="yokosuka_miura">横須賀三浦</option>
            <option value="kenou">県央</option>
            <option value="shonan_east">湘南東部</option>
            <option value="shonan_west">湘南西部</option>
            <option value="kensei">県西</option>
            <option value="tokyo">東京</option>
            <option value="chiba">千葉</option>
            <option value="saitama">埼玉</option>
          </select>
        </div>
      </div>

      <div class="consent">
        <label>
          <input type="checkbox" id="consentPrivacy" required>
          <span><a href="https://quads-nurse.com/privacy.html" target="_blank" rel="noopener">利用規約・個人情報保護方針</a>に同意し、<b>ナースロビー会員として登録します</b>。入力情報は求人紹介業務に利用されます（必須）</span>
        </label>
        <div class="note">
          履歴書を作成する場合のみ、志望動機の生成にOpenAI社のAI APIを利用します（別途同意画面あり）。このページでの登録ではAIへの送信はありません。
        </div>
      </div>
    </form>
  </div>

  <div class="submit-bar">
    <button type="button" class="submit-btn" id="submitBtn" onclick="submit()">会員登録する</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const WORKER_BASE = 'https://robby-the-match-api.robby-the-robot-2026.workers.dev';
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token') || '';
    if (token && window.history && window.history.replaceState) {
      window.history.replaceState({}, '', window.location.pathname);
    }
    if (!token) {
      document.getElementById('status').className = 'status error';
      document.getElementById('status').textContent = 'このページはLINEからのみアクセスできます。';
    }

    async function submit() {
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      const consent = document.getElementById('consentPrivacy').checked;
      if (!consent) {
        status.className = 'status error';
        status.textContent = '利用規約・個人情報保護方針への同意が必要です。';
        return;
      }
      if (!token) {
        status.className = 'status error';
        status.textContent = 'リンクが無効です。LINEからもう一度お試しください。';
        return;
      }
      const form = document.getElementById('liteForm');
      if (!form.lastName.value || !form.firstName.value || !form.phone.value) {
        status.className = 'status error';
        status.textContent = 'お名前と電話番号は必須です。';
        return;
      }
      btn.disabled = true;
      status.className = 'status';
      status.textContent = '登録中...';

      try {
        const res = await fetch(WORKER_BASE + '/api/member-lite-register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token,
            consentPrivacy: true,
            lastName: form.lastName.value,
            firstName: form.firstName.value,
            lastNameFurigana: form.lastNameFurigana.value,
            firstNameFurigana: form.firstNameFurigana.value,
            phone: form.phone.value,
            email: form.email.value,
            preferredArea: form.preferredArea.value,
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
          throw new Error(err.error || '登録に失敗しました');
        }
        const result = await res.json();
        if (result.success && result.mypageUrl) {
          alert('✨ ナースロビー会員になりました！マイページへ移動します。');
          window.location.href = result.mypageUrl;
        } else {
          throw new Error('登録に失敗しました');
        }
      } catch (e) {
        status.className = 'status error';
        status.textContent = 'エラー: ' + e.message;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>

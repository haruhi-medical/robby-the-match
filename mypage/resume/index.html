<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>履歴書 | ナースロビー マイページ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/mypage/mypage.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; }
    #app { display: flex; flex-direction: column; flex: 1; }
    #resumeFrame {
      flex: 1;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>

  <!-- Site Header -->
  <header class="site-header">
    <img src="/assets/logo-nursrobby.png" alt="ナースロビー" height="40">
  </header>

  <div id="loading" class="loading">読み込み中...</div>

  <div id="app" style="display:none;">
    <!-- Toolbar -->
    <div class="toolbar" role="toolbar" aria-label="履歴書操作">
      <a href="/mypage/" class="btn btn-outline btn-sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        マイページへ戻る
      </a>
      <button class="btn btn-primary btn-sm" onclick="printFrame()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        印刷 / PDF保存
      </button>
      <a href="/mypage/resume/edit.html" class="btn btn-outline btn-sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        編集する
      </a>
    </div>
    <iframe id="resumeFrame" src="about:blank" title="履歴書プレビュー"></iframe>
  </div>

  <div id="empty" class="container" style="display:none;">
    <div class="page-title-area">
      <div class="page-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        履歴書が未作成です
      </div>
    </div>
    <div class="card">
      <p style="margin-bottom:16px;">まずは履歴書を作成してください。</p>
      <a href="/mypage/" class="btn btn-primary">マイページへ戻る</a>
    </div>
  </div>

  <script src="/mypage/mypage.js?v=20260423b"></script>
  <script>
    (async () => {
      try {
        const session = await initMypageAuth();
        if (!session) return;

        const res = await apiCall('/api/mypage-resume');
        if (res.status === 404) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('empty').style.display = 'block';
          return;
        }
        if (!res.ok) {
          throw new Error(`履歴書の取得に失敗しました (HTTP ${res.status})`);
        }
        const html = await res.text();

        const frame = document.getElementById('resumeFrame');
        frame.srcdoc = html;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
      } catch (e) {
        document.getElementById('loading').innerHTML =
          `<div class="container"><div class="error-box">エラー: ${e.message}</div>
          <a href="/mypage/" class="btn btn-outline" style="margin-top:12px;">マイページへ戻る</a></div>`;
      }
    })();

    function printFrame() {
      const frame = document.getElementById('resumeFrame');
      try {
        frame.contentWindow.focus();
        frame.contentWindow.print();
      } catch (e) {
        alert('印刷に失敗しました: ' + e.message);
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>マイページ | ナースロビー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/mypage/mypage.css">
</head>
<body>

  <!-- Site Header -->
  <header class="site-header">
    <img src="/assets/logo-nursrobby.png" alt="ナースロビー" height="40">
  </header>

  <div id="loading" class="loading">読み込み中...</div>

  <div id="app" style="display:none;">
    <main class="container">

      <!-- Page Title -->
      <div class="page-title-area">
        <div class="page-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          マイページ
        </div>
        <p class="page-subtitle" id="greeting"></p>
      </div>

      <!-- 履歴書カード -->
      <div class="card" id="resumeCard">
        <div class="card-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          <h2>履歴書</h2>
        </div>
        <p class="muted" id="resumeMeta">読み込み中...</p>
        <div style="margin-top:12px;">
          <a href="/mypage/resume/" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
              <rect x="6" y="14" width="12" height="8"/>
            </svg>
            確認・印刷する
          </a>
          <a href="/mypage/resume/edit.html" class="btn btn-outline">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            編集する
          </a>
        </div>
      </div>

      <!-- 希望条件カード -->
      <div class="card" id="prefsCard">
        <div class="card-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <h2>希望条件</h2>
        </div>
        <p class="muted" id="prefsMeta">未設定</p>
        <div style="margin-top:12px;">
          <a href="/mypage/preferences/" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/>
            </svg>
            希望条件を設定する
          </a>
        </div>
      </div>

      <!-- お気に入りカード -->
      <div class="card" id="favCard">
        <div class="card-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <h2>お気に入り求人</h2>
        </div>
        <p class="muted" id="favMeta">0件</p>
        <div style="margin-top:12px;">
          <a href="/mypage/favorites/" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            お気に入り一覧を見る
          </a>
        </div>
      </div>

      <!-- 近日追加予定 -->
      <div class="card-muted">
        <h3>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          近日中に追加予定
        </h3>
        <ul>
          <li>AI新着求人の定期配信（LINE通知）</li>
          <li>LINE Botで求人に保存ボタン追加</li>
        </ul>
      </div>

      <!-- 下部ボタン -->
      <div style="margin-top: 8px;">
        <button class="btn btn-danger" id="deleteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          履歴書を削除する
        </button>
        <a href="https://lin.ee/oUgDB3x" class="btn btn-outline">LINE公式に戻る</a>
      </div>

    </main>
  </div>

  <div aria-live="polite" class="sr-only" id="ariaLive"></div>

  <script src="/mypage/mypage.js?v=20260423d"></script>
  <script>
    (async () => {
      try {
        const session = await initMypageAuth();
        if (!session) return;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('greeting').textContent = `こんにちは、${session.displayName || 'ナースロビー会員'} 様`;
        if (session.resumeUpdatedAt) {
          const d = new Date(session.resumeUpdatedAt);
          document.getElementById('resumeMeta').textContent = `最終更新: ${d.toLocaleString('ja-JP')}`;
        } else {
          document.getElementById('resumeMeta').textContent = '履歴書が未作成です';
        }

        // 希望条件の設定状況
        try {
          const pr = await apiCall('/api/mypage-preferences');
          if (pr.ok) {
            const pd = await pr.json();
            if (pd.preferences && pd.preferences.updatedAt) {
              const d = new Date(pd.preferences.updatedAt);
              document.getElementById('prefsMeta').textContent = `最終更新: ${d.toLocaleString('ja-JP')}`;
            }
          }
        } catch {}

        // お気に入り件数
        try {
          const fr = await apiCall('/api/mypage-favorites');
          if (fr.ok) {
            const fd = await fr.json();
            const n = (fd.favorites || []).length;
            document.getElementById('favMeta').textContent = n > 0 ? `${n}件保存中` : '0件';
          }
        } catch {}

        document.getElementById('deleteBtn').addEventListener('click', async () => {
          if (!confirm('履歴書を削除します。この操作は取り消せません。よろしいですか？')) return;
          const res = await apiCall('/api/mypage-resume', { method: 'DELETE' });
          if (res.ok) {
            alert('削除しました');
            window.location.reload();
          } else {
            alert('削除に失敗しました');
          }
        });
      } catch (e) {
        document.getElementById('loading').innerHTML = `<div class="container"><div class="error-box">エラー: ${e.message}</div></div>`;
      }
    })();
  </script>
</body>
</html>
